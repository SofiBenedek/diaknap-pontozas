<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diáknap pontozás</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="background-glow glow-1"></div>
  <div class="background-glow glow-2"></div>

  <div class="container">
    <header class="hero">
      <p class="hero-badge">Diáknap 2026</p>
      <h1>Osztálypontozó</h1>
      <p class="hero-text">
        Pontok gyors hozzáadása, levonása és az aktuális állás követése egy helyen.
      </p>
    </header>

    <section class="card password-card">
      <h2>Admin belépés</h2>
      <div class="input-group">
        <input type="password" id="adminPassword" placeholder="Jelszó" />
        <button onclick="savePassword()">Mentés</button>
      </div>
    </section>

    <section class="actions-grid">
      <div class="card action-card add-card">
        <div class="card-top">
          <span class="card-icon">＋</span>
          <h2>Pont hozzáadása</h2>
        </div>

        <label>Osztály</label>
        <select id="addClassName"></select>

        <label>Pontszám</label>
        <input type="number" id="addPoints" placeholder="1 - 10" min="1" max="10" />

        <button class="primary-btn" onclick="addPoints()">Pont hozzáadása</button>
      </div>

      <div class="card action-card remove-card">
        <div class="card-top">
          <span class="card-icon">－</span>
          <h2>Pont levonása</h2>
        </div>

        <label>Osztály</label>
        <select id="removeClassName"></select>

        <label>Pontszám</label>
        <input type="number" id="removePoints" placeholder="1 - 10" min="1" max="10" />

        <button class="secondary-btn" onclick="removePoints()">Pont levonása</button>
      </div>
    </section>

    <div class="message" id="message"></div>

    <section class="card scoreboard-card">
      <div class="scoreboard-header">
        <div>
          <h2>Aktuális állás</h2>
          <p>Az osztályok pontszámai csökkenő sorrendben.</p>
        </div>
        <button class="refresh-btn" onclick="loadClasses()">Frissítés</button>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Osztály</th>
              <th>Pont</th>
              <th>Művelet</th>
            </tr>
          </thead>
          <tbody id="classTableBody"></tbody>
        </table>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
