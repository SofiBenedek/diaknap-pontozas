<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diáknap pontozás</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Diáknap pontozó</h1>

    <div class="card password-card">
      <h2>Belépés</h2>
      <input type="password" id="adminPassword" placeholder="Jelszó" />
      <button onclick="savePassword()">Jelszó mentése</button>
    </div>

    <div class="cards">
      <div class="card">
        <h2>Pont hozzáadása</h2>
        <select id="addClassName"></select>
        <input type="number" id="addPoints" placeholder="Pontszám (1-10)" min="1" max="10" />
        <button onclick="addPoints()">Hozzáadás</button>
      </div>

      <div class="card">
        <h2>Pont levonása</h2>
        <select id="removeClassName"></select>
        <input type="number" id="removePoints" placeholder="Levonandó pont (1-10)" min="1" max="10" />
        <button onclick="removePoints()">Levonás</button>
      </div>
    </div>

    <div class="message" id="message"></div>

    <div class="scoreboard">
      <h2>Eredmények</h2>
      <button onclick="loadClasses()">Frissítés</button>

      <table>
        <thead>
          <tr>
            <th>Osztály</th>
            <th>Pont</th>
            <th>Művelet</th>
          </tr>
        </thead>
        <tbody id="classTableBody"></tbody>
      </table>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
